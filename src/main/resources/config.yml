# SuperStocks 主配置文件
# 修改后可使用 /stocks reload 重载大部分配置。

# 当前语言文件名，对应 plugins/SuperStocks/Language/<language>.yml
language: zh_CN

stock-provider:
  # 当前启用的数据源，只能选择一个。
  # 可选: tencent, eastmoney, ths, xueqiu, sina
  # 说明: 默认腾讯财经已验证可用。其他数据源预留独立配置项，适合接入兼容代理或后续扩展解析器。
  active: tencent

  # 行情自动刷新间隔，单位秒。不要设置过低，避免外部接口限流。
  refresh-seconds: 300

  # HTTP 请求超时时间，单位秒。
  timeout-seconds: 8

  # 同步成功时是否在控制台输出数量统计。
  log-success: true

  sources:
    tencent:
      display-name: "腾讯财经"
      endpoint: "https://qt.gtimg.cn/q={symbols}"
      encoding: "GBK"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    eastmoney:
      display-name: "东方财富"
      endpoint: "https://example.com/eastmoney?q={symbols}"
      encoding: "UTF-8"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    ths:
      display-name: "同花顺"
      endpoint: "https://example.com/ths?q={symbols}"
      encoding: "UTF-8"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    xueqiu:
      display-name: "雪球"
      endpoint: "https://example.com/xueqiu?q={symbols}"
      encoding: "UTF-8"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    sina:
      display-name: "新浪财经"
      endpoint: "https://example.com/sina?q={symbols}"
      encoding: "GBK"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

