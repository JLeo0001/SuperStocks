# SuperStocks 主配置文件
# 修改后使用 /stocks reload 即可热重载，无需重启服务器。
# 开箱即用：安装插件后直接启动即可交易，高风险功能均已默认关闭。

# 语言。文件位于 plugins/SuperStocks/Language/<语言>.yml
# 内置 13 种语言: zh_CN / zh_HK / zh_MO / zh_TW / en_US
#   ja_JP / ko_KR / ar_SA / de_DE / es_ES / fr_FR / pt_BR / ru_RU
language: zh_CN

# 配置版本号，升级插件时自动补齐新配置项，切勿手动降低。
config-version: 2

# ============================================================
# 行情源 —— 现实股票数据从哪获取
# ============================================================
stock-provider:
  # 当前启用的数据源。内置腾讯财经解析器，其余为预留项。
  active: tencent

  # 自动刷新间隔（秒）。建议 300-600，过短可能被接口限流。
  refresh-seconds: 300

  # HTTP 请求超时（秒），网络差可调大到 15。
  timeout-seconds: 8

  # 同步成功时是否在控制台打印数量。
  log-success: true

  sources:
    # 内置解析器仅支持腾讯财经。其余为预留数据源。
    tencent:
      display-name: "腾讯财经"
      endpoint: "https://qt.gtimg.cn/q={symbols}"
      encoding: "GBK"
      symbol-separator: ","
      # 单次请求最多携带多少只股票。
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    # 以下为预留数据源，内置解析器暂时无法直接使用。
    # 可用于接入自建代理或后续扩展的解析器。
    eastmoney:
      display-name: "东方财富"
      endpoint: "https://example.com/eastmoney?q={symbols}"
      encoding: "UTF-8"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    ths:
      display-name: "同花顺"
      endpoint: "https://example.com/ths?q={symbols}"
      encoding: "UTF-8"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    xueqiu:
      display-name: "雪球"
      endpoint: "https://example.com/xueqiu?q={symbols}"
      encoding: "UTF-8"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

    sina:
      display-name: "新浪财经"
      endpoint: "https://example.com/sina?q={symbols}"
      encoding: "GBK"
      symbol-separator: ","
      max-symbols-per-request: 80
      user-agent: "SuperStocks/1.0"

