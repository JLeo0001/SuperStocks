prefix: "&8[&aSuperStocks&8] "

commands:
  no-permission: "&cYou do not have permission to use this command."
  player-only: "&cOnly players can open the stock market GUI."
  reloaded: "&aSuperStocks has been reloaded."
  sync-started: "&aThe quote sync task has been executed."
  unknown-subcommand: "&cUnknown subcommand. Use /stocks help for help."
  buy-usage: "&eUsage: /stocks buy <symbol> <shares>"
  sell-usage: "&eUsage: /stocks sell <symbol> <shares>"
  quote-usage: "&eUsage: /stocks quote <symbol>"
  invalid-amount: "&cAmount must be a number greater than 0."
  quote-not-found: "&cNo cached quote was found for this stock."
  portfolio-header: "&6===== My Portfolio ====="
  portfolio-empty: "&7You do not have any holdings yet."
  portfolio-line: "&e{symbol} &7| Shares: &f{shares} &7| Cost: &f{average_cost} &7| Price: &f{price} &7| Value: &f{value} &7| P/L: &f{profit}"
  rank-winners-header: "&e===== Top Investors ====="
  rank-losers-header: "&c===== Bottom Board ====="
  rank-empty: "&7No ranking data available."
  rank-line: "&f#{rank} &e{player} &7| Value: &f{value} &7| P/L: &f{profit} &7| Return: &f{profit_percent}%"
  quote-info:
    - "&6===== Stock Quote ====="
    - "&7Name: &f{name}"
    - "&7Symbol: &f{symbol}"
    - "&7Market: &f{market}"
    - "&7Price: &f{price}"
    - "&7Change: &f{change} ({change_percent}%)"
    - "&7Updated: &f{updated_at}"
  help:
    - "&6===== SuperStocks Help ====="
    - "&e/stocks &7- Open the stock GUI"
    - "&e/stocks help &7- Show all commands"
    - "&e/stocks open &7- Open the stock GUI"
    - "&e/stocks quote <symbol> &7- Show a quote"
    - "&e/stocks buy <symbol> <shares> &7- Buy shares"
    - "&e/stocks sell <symbol> <shares> &7- Sell shares"
    - "&e/stocks portfolio &7- Show text portfolio"
    - "&e/stocks rank winners &7- Show top investors"
    - "&e/stocks rank losers &7- Show bottom board"
    - "&e/stocks sync &7- Admin: sync quotes"
    - "&e/stocks reload &7- Admin: reload plugin"

messages:
  quote-unavailable: "&cThis stock has no quote data yet and cannot be traded."
  portfolio-load-failed: "&cFailed to load your portfolio. Please contact an administrator."
  ranking-load-failed: "&cFailed to load rankings. Please contact an administrator."
  trade-failed: "&cTrade failed. Please contact an administrator."
  economy-unavailable: "Economy service is not ready"
  min-shares: "Minimum trade size is {shares} shares"
  not-enough-money: "Insufficient balance. Required: {amount}"
  withdraw-failed: "Payment failed"
  buy-success: "Bought {name} x {shares}, cost {amount}"
  not-enough-shares: "Not enough shares"
  deposit-failed: "Sale recorded, but payout failed. Please contact an administrator"
  sell-success: "Sold {name} x {shares}, received {amount}"

gui:
  main:
    title: "&2&lSuperStocks &8| &fTrading Hall"
    market-lore:
      - "&7Open the &f{market}&7 market"
      - "&7Configured stocks: &f{configured}"
      - "&7Loaded quotes: &a{loaded}"
      - ""
      - "&eClick to view"
    portfolio-name: "&6My Portfolio"
    portfolio-lore:
      - "&7View stocks, cost, value, and P/L"
      - "&7Cached quotes: &f{loaded_total}&7/&f{configured_total}"
      - ""
      - "&eClick to open"
    winners-name: "&eTop Investors"
    winners-lore:
      - "&7Ranked by current unrealized P/L"
      - "&7Higher profit ranks higher"
      - ""
      - "&eClick to view"
    losers-name: "&cBottom Board"
    losers-lore:
      - "&7Ranked by current unrealized P/L"
      - "&7Larger losses rank higher"
      - ""
      - "&eClick to view"
    stats-name: "&bQuote Stats"
    stats-lore:
      - "&7Source: &f{provider}"
      - "&7Configured stocks: &f{configured_total}"
      - "&7Loaded stocks: &a{loaded_total}"
      - "&7Refresh interval: &f{refresh_seconds}s"
      - ""
      - "&7Last sync: &f{last_sync}"
  market:
    title: "&2Market &8- &f{market}"
    missing-name: "&7{symbol}"
    missing-lore:
      - "&cNo cached quote data"
      - "&7Waiting for the next sync"
    stats-name: "&b{market} Stats"
    stats-lore:
      - "&7Configured stocks: &f{configured}"
      - "&7Loaded quotes: &a{loaded}"
      - "&7Source: &f{provider}"
  stock:
    title: "&2Stock &8- &f{name}"
    quote-lore:
      - "&8{market}"
      - "&7Symbol: &f{symbol}"
      - "&7Price: &f{price}"
      - "&7Change: {change_color}{change} ({change_percent}%)"
      - "&7Updated: &f{updated_at}"
      - ""
      - "&eClick to trade"
    buy-name: "&aBuy {shares} shares"
    buy-lore:
      - "&7Trades at the cached quote"
      - "&7Estimated cost: &f{amount}"
    sell-name: "&cSell {shares} shares"
    sell-lore:
      - "&7Trades at the cached quote"
      - "&7Estimated proceeds: &f{amount}"
  portfolio:
    title: "&6My Portfolio"
    holding-lore:
      - "&7Symbol: &f{symbol}"
      - "&7Shares: &f{shares}"
      - "&7Cost: &f{average_cost}"
      - "&7Price: &f{price}"
      - "&7Market value: &f{market_value}"
      - "&7P/L: {profit_color}{profit}"
      - ""
      - "&eClick to trade"
    holding-missing-lore:
      - "&7Symbol: &f{symbol}"
      - "&7Shares: &f{shares}"
      - "&7Cost: &f{average_cost}"
      - "&cNo cached quote data"
  ranking:
    winners-title: "&eTop Investors"
    losers-title: "&cBottom Board"
    entry-name: "&f#{rank} &e{player}"
    winner-lore:
      - "&7Player: &f{player}"
      - "&7Portfolio value: &f{value}"
      - "&7Unrealized P/L: {profit_color}{profit}"
      - "&7Return: {profit_color}{profit_percent}%"
    loser-lore:
      - "&7Player: &f{player}"
      - "&7Portfolio value: &f{value}"
      - "&7Unrealized P/L: {profit_color}{profit}"
      - "&7Return: {profit_color}{profit_percent}%"
  common:
    back-name: "&fBack"
    back-main-name: "&fBack to Main"
    close-name: "&cClose"
    filler-name: " "
